name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        php: ['8.3', '8.4', '8.5']
        dependency-version: [prefer-lowest, prefer-stable]

    name: Tests P${{ matrix.php }} - ${{ matrix.os }} - ${{ matrix.dependency-version }}

    steps:

    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: dom, libxml, mbstring, zip, fileinfo, iconv, openssl, simplexml, xml, xmlwriter, tokenizer, ctype, filter, phar, session
        coverage: none

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: dependencies-php-${{ matrix.php }}-os-${{ matrix.os }}-version-${{ matrix.dependency-version }}-composer-${{ hashFiles('composer.json') }}
        restore-keys: dependencies-php-${{ matrix.php }}-os-${{ matrix.os }}-version-${{ matrix.dependency-version }}-composer-

    - name: Install Composer dependencies
      run: composer update --${{ matrix.dependency-version }} --no-interaction --prefer-dist

    - name: Integration Tests
      run: php ./vendor/bin/pest

  nightly:
    runs-on: ubuntu-latest
    continue-on-error: true

    name: Tests PHP nightly (non-blocking)

    steps:

    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: nightly
        extensions: dom, libxml, mbstring, zip, fileinfo, iconv, openssl, simplexml, xml, xmlwriter, tokenizer, ctype, filter, phar, session
        coverage: none

    - name: Install Composer dependencies
      run: composer update --no-interaction --prefer-dist --ignore-platform-req=php+

    - name: Integration Tests
      run: php ./vendor/bin/pest

  tests-ok:
    runs-on: ubuntu-latest
    needs: ci
    if: always()

    name: Tests OK

    steps:
      - name: Check matrix result
        run: test "${{ needs.ci.result }}" = "success"
